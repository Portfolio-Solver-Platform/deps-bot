name: Run deps bot single-repo
on:
  repository_dispatch:
    types: [run-single]
  workflow_dispatch:
    inputs:
      repository:
        description: 'Target repository (e.g., owner/repo)'
        required: true
        type: string

env:
  RENOVATE_VERSION: 43.80.0 # renovate: datasource=docker depName=ghcr.io/renovatebot/renovate
  TARGET_REPO: ${{ github.event.client_payload.repository || inputs.repository }}

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate app token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        id: app-token
        with:
          app-id: ${{ vars.INFRASTRUCTURE_BOT_APP_ID }}
          private-key: ${{ secrets.INFRASTRUCTURE_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@abd08c7549b2a864af5df4a2e369c43f035a6a9d # v46.1.5
        with:
          renovate-version: ${{ env.RENOVATE_VERSION }}
          configurationFile: config.js
          token: ${{ steps.app-token.outputs.token }}
        env:
          RENOVATE_REPOSITORIES: ${{ env.TARGET_REPO }}
